# Deploy the Guess Who frontend to GitHub Pages.
#
# Triggers on every push to main.
# The backend (Socket.IO server) is NOT deployed here —
# it must be hosted separately. Set the VITE_SERVER_URL
# secret/variable in GitHub repo settings to point to it.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          # Point the Socket.IO client at the backend.
          # Set VITE_SERVER_URL as a GitHub repo variable/secret,
          # e.g. https://guess-who-server.onrender.com
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: npm run build --workspace=web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
